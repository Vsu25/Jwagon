<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamDeck Login</title>
  <style>
    body {
      background-color: #0D0D0D;
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background-color: #1a1a1a;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .btn-kick {
      display: inline-block;
      background-color: #53FC18;
      color: #000;
      padding: 15px 30px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1.1rem;
      margin-top: 20px;
      transition: background-color 0.2s;
    }
    .btn-kick:hover {
      background-color: #45d614;
    }
    .info {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <h1>StreamDeck</h1>
    <p>Multi-Streamer OBS Overlay Manager</p>
    <a href="/api/auth/kick" class="btn-kick">Login with Kick</a>
    <p class="info">Mods: Use the "Login with Kick" button above. You will be routed to your assigned streamer's dashboard automatically.</p>
  </div>
</body>
</html>
