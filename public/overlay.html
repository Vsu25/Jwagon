<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamDeck Overlay</title>
  <link rel="stylesheet" href="/css/overlay-anims.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    #overlay-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .overlay-element {
      position: absolute;
      /* Default entry animation class mapped dynamically later */
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const userId = pathParts[pathParts.length - 1];
    
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws?userId=${userId}&role=viewer`;
    let ws;
    
    let state = { elements: {} };
    const container = document.getElementById('overlay-container');

    function connectWs() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => console.log('Overlay WS Connected');
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };
      ws.onclose = () => {
        console.log('WS Disconnected. Reconnecting in 2s...');
        setTimeout(connectWs, 2000);
      };
    }
    
    function deepMerge(target, path, value) {
      const keys = path.split('.');
      let current = target;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!current[keys[i]]) current[keys[i]] = {};
        current = current[keys[i]];
      }
      current[keys[keys.length - 1]] = value;
    }

    function handleMessage(msg) {
      if (msg.type === 'state:update') {
        const { path, value } = msg.data;
        deepMerge(state, path, value);
        renderOverlay();
      } else if (msg.type === 'state:batch_update') {
        msg.data.updates.forEach(u => deepMerge(state, u.path, u.value));
        renderOverlay();
      } else if (msg.type === 'alert:fire') {
        renderAlert(msg.data);
      } else if (msg.type === 'coop:notification') {
        renderCoopNotification(msg.data);
      } else if (msg.type === 'countdown:tick' || msg.type === 'countdown:update') {
        renderCountdown(msg.data.currentMs);
        if (msg.data.addedMs) renderTimeChip(msg.data.addedMs, msg.data.source);
      } else if (msg.type === 'countdown:zero') {
        renderTimeZero();
      } else if (msg.type === 'goal:update') {
        renderGoal(msg.data.currentCount);
      } else if (msg.type === 'goal:reached') {
        renderGoalReached(msg.data.goalName);
      }
    }

    function renderCountdown(ms) {
       let cd = document.getElementById('cd-display');
       if(!cd) {
           cd = document.createElement('div');
           cd.id = 'cd-display';
           cd.className = 'overlay-element gpu-accel';
           cd.style.top = '20px';
           cd.style.left = '20px';
           cd.style.fontSize = '48px';
           cd.style.color = '#fff';
           cd.style.fontFamily = 'monospace';
           cd.style.fontWeight = 'bold';
           cd.style.textShadow = '0px 0px 4px #000';
           document.getElementById('overlay-container').appendChild(cd);
       }
       if (cd.innerText === "TIME'S UP") cd.className = 'overlay-element gpu-accel';
       
       const date = new Date(ms);
       const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
       const m = String(date.getUTCMinutes()).padStart(2, '0');
       const s = String(date.getUTCSeconds()).padStart(2, '0');
       cd.innerText = `${h}:${m}:${s}`;
       
       if (ms <= 60000) cd.style.color = '#ff3333';
       else cd.style.color = '#fff';
    }
    
    function renderTimeChip(addedMs, source) {
       const str = `+${addedMs/1000}s`;
       const c = document.createElement('div');
       c.className = 'overlay-element anim-slide-up';
       c.innerText = str;
       c.style.top = '70px';
       c.style.left = '20px';
       c.style.color = '#53FC18';
       c.style.fontWeight = 'bold';
       document.getElementById('overlay-container').appendChild(c);
       setTimeout(() => {
           c.className = 'overlay-element anim-slide-up-out';
           setTimeout(() => c.remove(), 400);
       }, 3000);
    }
    
    function renderTimeZero() {
       const cd = document.getElementById('cd-display');
       if (cd) {
           cd.innerText = "TIME'S UP";
           cd.className = 'overlay-element anim-scale-pop';
       }
    }

    function renderGoal(count) {
       let gl = document.getElementById('goal-display');
       if(!gl) {
           gl = document.createElement('div');
           gl.id = 'goal-display';
           gl.className = 'overlay-element gpu-accel';
           gl.style.top = '120px';
           gl.style.left = '20px';
           gl.style.padding = '10px';
           gl.style.backgroundColor = 'rgba(0,0,0,0.5)';
           gl.style.borderRadius = '8px';
           gl.style.color = '#fff';
           gl.style.fontWeight = 'bold';
           gl.style.minWidth = '200px';
           document.getElementById('overlay-container').appendChild(gl);
       }
       // Hardcoded targetCount placeholder for styling demo
       gl.innerHTML = `<div>Goal</div><div style="color:#53FC18; font-size: 24px;">${count} / Target</div>`;
    }

    function renderGoalReached(name) {
       let gl = document.getElementById('goal-display');
       if (gl) {
         gl.className = 'overlay-element anim-celebrate';
         setTimeout(() => { gl.className = 'overlay-element gpu-accel'; }, 1000);
       }
    }

    connectWs();
  </script>
</body>
</html>
