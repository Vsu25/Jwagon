<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamDeck Overlay</title>
  <link rel="stylesheet" href="/css/overlay-anims.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    #overlay-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .overlay-element {
      position: absolute;
      pointer-events: none;
    }

    /* ── Countdown ── */
    #cd-display {
      top: 20px; left: 20px;
      font-size: 52px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7), 0 0 20px rgba(0,0,0,0.3);
      letter-spacing: 3px;
    }
    #cd-display.danger { color: #ff4444; animation: timerPulseBig 1s ease-in-out infinite; }
    #cd-display.times-up { font-size: 64px; color: #ff4444; }
    @keyframes timerPulseBig { 0%, 100% { opacity:1; transform: scale(1); } 50% { opacity:0.6; transform: scale(1.03); } }

    /* ── Goal Bar ── */
    #goal-display {
      top: 90px; left: 20px;
      padding: 14px 20px;
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      color: #fff;
      min-width: 300px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .goal-label { font-size: 12px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .goal-name { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .goal-progress-bg {
      width: 100%; height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }
    .goal-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3ab812, #53FC18);
      border-radius: 5px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .goal-progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 20px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
      border-radius: 5px;
    }
    .goal-count-text { font-size: 15px; color: #53FC18; font-family: 'JetBrains Mono', monospace; margin-top: 8px; }

    /* ── Goal Completion Animation ── */
    .goal-complete-anim {
      animation: goalCompleteFlashy 2.5s ease-in-out forwards;
    }
    @keyframes goalCompleteFlashy {
      0% { transform: scale(1); opacity: 1; filter: brightness(1); }
      8% { transform: scale(1.08); filter: brightness(1.8); }
      16% { transform: scale(1.04); filter: brightness(1.2); }
      24% { transform: scale(1.1); filter: brightness(2); }
      40% { transform: scale(1.06); filter: brightness(1.4); }
      55% { transform: scale(1.08); filter: brightness(1.6) hue-rotate(20deg); }
      70% { transform: scale(1.05); filter: brightness(1.2); opacity: 1; }
      85% { transform: scale(0.98) translateY(-5px); opacity: 0.6; }
      100% { transform: scale(0.9) translateY(-20px); opacity: 0; }
    }
    .goal-enter-anim {
      animation: goalEnterSmooth 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes goalEnterSmooth {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Goal Celebration Particles ── */
    .celebration-particle {
      position: absolute;
      pointer-events: none;
      font-size: 24px;
      animation: particleBurst 1.5s ease-out forwards;
    }
    @keyframes particleBurst {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.3) rotate(var(--rot)); }
    }

    /* ── Roulette ── */
    #roulette-container {
      top: 150px; right: 40px;
      width: 340px; height: 340px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #roulette-container.fade-out {
      opacity: 0;
      transform: scale(0.9);
    }
    .roulette-frame {
      position: relative;
      width: 340px; height: 340px;
    }
    #roulette-pointer {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 24px solid #53FC18;
      filter: drop-shadow(0 0 6px rgba(83,252,24,0.6)) drop-shadow(0 2px 3px rgba(0,0,0,0.8));
      z-index: 10;
    }
    /* Black outline on arrow via pseudo-element */
    .arrow-outline {
      position: absolute;
      top: -17px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 17px solid transparent;
      border-right: 17px solid transparent;
      border-top: 28px solid #000;
      z-index: 9;
    }
    #roulette-canvas {
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 4px solid #000;
      outline: 3px solid #53FC18;
      outline-offset: 0px;
      box-shadow: 0 0 25px rgba(83,252,24,0.3), 0 0 50px rgba(83,252,24,0.1), inset 0 0 15px rgba(0,0,0,0.3);
      transition: transform 7s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    /* ── Roulette Result Popup ── */
    #roulette-result-popup {
      top: 510px; right: 40px;
      display: none;
      background: rgba(0,0,0,0.9);
      border: 2px solid #53FC18;
      border-radius: 14px;
      padding: 18px 32px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(83,252,24,0.25), 0 0 80px rgba(83,252,24,0.08);
    }
    #roulette-result-popup .result-label { font-size: 11px; color: #53FC18; text-transform: uppercase; letter-spacing: 3px; }
    #roulette-result-popup .result-text { font-size: 28px; font-weight: 800; color: #fff; margin-top: 6px; }
    .result-appear { animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes resultPop { from { opacity:0; transform: scale(0.6); } to { opacity:1; transform: scale(1); } }

    /* ── Alert Box ── */
    #alert-box {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      border: 2px solid #53FC18;
      border-radius: 14px;
      padding: 24px 44px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      display: none;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 50px rgba(83,252,24,0.15);
      min-width: 320px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="overlay-container"></div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const userId = pathParts[pathParts.length - 1];

    let supabaseClient;
    let realtimeChannel;

    // ─── Overlay State ───
    let elementVisibility = { alertBox: true, countdown: true, goalBar: true, roulette: true };
    
    let timerRunning = false;
    let currentTimerMs = 0;
    let timerEndTime = null;

    let goalsList = [
      { id: '1', name: 'Play Horror Game', type: 'subs', targetCount: 10 },
      { id: '2', name: 'Dye Hair Blue', type: 'subs', targetCount: 50 }
    ];
    let currentGoalCount = 0;
    let currentGoalIndex = 0;
    let rouletteSlices = [];
    let currentRotation = 0;
    let rouletteHideTimer = null;
    const container = document.getElementById('overlay-container');

    // ─── Realtime & Initialization ───
    async function init() {
      try {
        // Fetch Supabase Config
        const confRes = await fetch('/api/supabase-config');
        const conf = await confRes.json();
        supabaseClient = window.supabase.createClient(conf.url, conf.anonKey);

        // Fetch Initial State
        const stateRes = await fetch('/api/state/' + userId);
        const stateData = await stateRes.json();
        applyInitialState(stateData);

        connectRealtime();
        
        // Start local ticker
        setInterval(() => {
          if (timerRunning && timerEndTime) {
            currentTimerMs = Math.max(0, timerEndTime - Date.now());
            if (elementVisibility.countdown) renderCountdown(currentTimerMs);
          }
        }, 100);
      } catch (err) {
        console.error('Failed to init overlay:', err);
      }
    }

    function applyInitialState(state) {
      if (state.overlay && state.overlay.elements) {
        Object.keys(state.overlay.elements).forEach(el => {
          if (state.overlay.elements[el].visible !== undefined) {
            elementVisibility[el] = state.overlay.elements[el].visible;
            toggleElementVisibility(el, elementVisibility[el]);
          }
          if (state.overlay.elements[el].position) {
            setElementPosition(el, state.overlay.elements[el].position.x, state.overlay.elements[el].position.y);
          }
        });
      }
      
      if (state.countdown) {
        timerRunning = state.countdown.running;
        currentTimerMs = state.countdown.currentMs;
        timerEndTime = state.countdown.endTime;
        if (elementVisibility.countdown) renderCountdown(currentTimerMs);
      }
      
      if (state.goals) {
        currentGoalCount = state.goals.currentCount || 0;
        goalsList = state.goals.list || [];
        if (elementVisibility.goalBar) renderCurrentGoal();
      }
      
      if (state.roulette && state.roulette.slices) {
        rouletteSlices = state.roulette.slices;
        if (elementVisibility.roulette) drawRouletteWheel();
      }
    }

    function connectRealtime() {
      const channelName = 'overlay:' + userId;
      realtimeChannel = supabaseClient.channel(channelName);
      
      realtimeChannel.on('broadcast', { event: '*' }, (payload) => {
        handleMessage({ type: payload.event, data: payload.payload });
      });

      realtimeChannel.subscribe();
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'state:update':
          handleStateUpdate(msg.data);
          break;
        case 'state:batch_update':
          msg.data.updates.forEach(u => handleStateUpdate(u));
          break;
        case 'alert:fire':
          renderAlert(msg.data);
          break;
        case 'countdown:update':
          currentTimerMs = msg.data.currentMs;
          timerEndTime = msg.data.endTime;
          timerRunning = msg.data.running;
          if (elementVisibility.countdown) renderCountdown(currentTimerMs);
          if (msg.data.addedMs && msg.data.addedMs !== 0) renderTimeChip(msg.data.addedMs);
          break;
        case 'countdown:state':
          timerRunning = msg.data.running;
          currentTimerMs = msg.data.currentMs;
          timerEndTime = msg.data.endTime;
          if (elementVisibility.countdown) renderCountdown(currentTimerMs);
          break;
        case 'countdown:zero':
          renderTimeZero();
          break;
        case 'goal:update':
          currentGoalCount = msg.data.currentCount;
          if (elementVisibility.goalBar) renderCurrentGoal();
          break;
        case 'goal:reached':
          handleGoalReached(msg.data.goalName);
          break;
        case 'goal:list':
          goalsList = msg.data.goals;
          renderCurrentGoal();
          break;
        case 'roulette:update':
          rouletteSlices = msg.data.slices;
          if (elementVisibility.roulette) drawRouletteWheel();
          break;
        case 'roulette:spin':
          if (elementVisibility.roulette) {
            showRouletteWheel();
            animateRouletteSpin(msg.data.targetAngle, msg.data.duration);
          }
          break;
        case 'roulette:result':
          if (elementVisibility.roulette) showRouletteResult(msg.data.result);
          break;
        case 'goal:mock_reverted':
          currentGoalCount = msg.data.newCount || Math.max(0, currentGoalCount - (msg.data.revertedAmount || 0));
          renderCurrentGoal();
          break;
        case 'coop:notification':
          renderCoopNotification(msg.data);
          break;
      }
    }

    // ─── State (toggles + positions) ───
    function handleStateUpdate(data) {
      const { path, value } = data;
      const visMatch = path.match(/^elements\.(\w+)\.visible$/);
      if (visMatch) {
        const el = visMatch[1];
        elementVisibility[el] = value;
        toggleElementVisibility(el, value);
        return;
      }
      const posMatch = path.match(/^elements\.(\w+)\.position$/);
      if (posMatch) {
        setElementPosition(posMatch[1], value.x, value.y);
        return;
      }
    }

    function toggleElementVisibility(elName, visible) {
      const map = { countdown: 'cd-display', goalBar: 'goal-display', roulette: 'roulette-container', alertBox: 'alert-box' };
      const el = document.getElementById(map[elName]);
      if (el) el.style.display = visible ? '' : 'none';
    }

    function setElementPosition(elName, x, y) {
      const map = { countdown: 'cd-display', goalBar: 'goal-display', roulette: 'roulette-container', alertBox: 'alert-box' };
      const el = document.getElementById(map[elName]);
      if (el) { el.style.left = x + '%'; el.style.top = y + '%'; el.style.right = 'auto'; }
    }

    // ─── Countdown ───
    function renderCountdown(ms) {
      let cd = document.getElementById('cd-display');
      if (!cd) {
        cd = document.createElement('div');
        cd.id = 'cd-display';
        cd.className = 'overlay-element';
        container.appendChild(cd);
      }
      if (!elementVisibility.countdown) { cd.style.display = 'none'; return; }
      cd.style.display = '';
      if (cd.innerText === "TIME'S UP") cd.className = 'overlay-element';

      const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
      const m = String(Math.floor((ms % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
      cd.innerText = `${h}:${m}:${s}`;
      cd.classList.toggle('danger', ms <= 60000 && ms > 0);
    }

    function renderTimeChip(addedMs) {
      const c = document.createElement('div');
      c.className = 'overlay-element';
      c.innerText = `+${addedMs/1000}s`;
      c.style.cssText = 'top:75px; left:20px; color:#53FC18; font-weight:bold; font-size:20px; text-shadow:0 2px 6px rgba(0,0,0,0.5); animation:chipSlide 2.5s ease forwards;';
      container.appendChild(c);
      setTimeout(() => c.remove(), 2500);
    }

    function renderTimeZero() {
      const cd = document.getElementById('cd-display');
      if (cd) { cd.innerText = "TIME'S UP"; cd.className = 'overlay-element times-up'; }
    }

    // ─── Goals (Hierarchical) ───
    function renderCurrentGoal() {
      let gl = document.getElementById('goal-display');
      if (!gl) {
        gl = document.createElement('div');
        gl.id = 'goal-display';
        gl.className = 'overlay-element';
        container.appendChild(gl);
      }
      if (!elementVisibility.goalBar) { gl.style.display = 'none'; return; }
      gl.style.display = '';

      let activeGoal = null;
      for (let i = 0; i < goalsList.length; i++) {
        if (currentGoalCount < goalsList[i].targetCount) {
          activeGoal = goalsList[i];
          currentGoalIndex = i;
          break;
        }
      }

      if (!activeGoal) {
        gl.innerHTML = `
          <div class="goal-label">🎉 ALL GOALS COMPLETE</div>
          <div class="goal-name" style="color:#53FC18;">Congratulations!</div>
        `;
        return;
      }

      const pct = Math.min(100, (currentGoalCount / activeGoal.targetCount) * 100);
      gl.innerHTML = `
        <div class="goal-label">Goal ${currentGoalIndex + 1} of ${goalsList.length}</div>
        <div class="goal-name">${activeGoal.name}</div>
        <div class="goal-progress-bg">
          <div class="goal-progress-fill" style="width:${pct}%;"></div>
        </div>
        <div class="goal-count-text">${currentGoalCount} / ${activeGoal.targetCount}</div>
      `;
    }

    function handleGoalReached(goalName) {
      const gl = document.getElementById('goal-display');
      if (!gl) return;

      // Spawn celebration particles
      spawnCelebrationParticles(gl);

      // Flashy complete animation
      gl.classList.add('goal-complete-anim');

      // Wait for full animation (2.5s) then transition to next goal smoothly
      setTimeout(() => {
        gl.classList.remove('goal-complete-anim');
        gl.style.opacity = '0';

        // Pause before showing next goal
        setTimeout(() => {
          currentGoalIndex++;
          renderCurrentGoal();
          gl.style.opacity = '';
          gl.classList.add('goal-enter-anim');
          setTimeout(() => gl.classList.remove('goal-enter-anim'), 800);
        }, 600);
      }, 2500);
    }

    function spawnCelebrationParticles(refEl) {
      const emojis = ['🎉', '⭐', '🎊', '✨', '💚', '🏆'];
      const rect = refEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'celebration-particle';
        p.innerText = emojis[i % emojis.length];
        const angle = (i / 12) * Math.PI * 2;
        const dist = 80 + Math.random() * 60;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.setProperty('--px', `${Math.cos(angle) * dist}px`);
        p.style.setProperty('--py', `${Math.sin(angle) * dist}px`);
        p.style.setProperty('--rot', `${Math.random() * 360}deg`);
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }

    // ─── Roulette ───
    function ensureRouletteContainer() {
      let rc = document.getElementById('roulette-container');
      if (!rc) {
        rc = document.createElement('div');
        rc.id = 'roulette-container';
        rc.className = 'overlay-element';
        rc.innerHTML = `
          <div class="roulette-frame">
            <div class="arrow-outline"></div>
            <div id="roulette-pointer"></div>
            <canvas id="roulette-canvas" width="680" height="680"></canvas>
          </div>
        `;
        container.appendChild(rc);
      }
      if (!elementVisibility.roulette) rc.style.display = 'none';
      else rc.style.display = '';
      return rc;
    }

    function showRouletteWheel() {
      const rc = ensureRouletteContainer();
      rc.classList.remove('fade-out');
      rc.style.display = '';
      if (rouletteHideTimer) { clearTimeout(rouletteHideTimer); rouletteHideTimer = null; }
    }

    function hideRouletteWheel() {
      const rc = document.getElementById('roulette-container');
      if (rc) rc.classList.add('fade-out');
    }

    function drawRouletteWheel() {
      ensureRouletteContainer();
      const canvas = document.getElementById('roulette-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx = 340, cy = 340, r = 320;

      ctx.clearRect(0, 0, 680, 680);

      if (rouletteSlices.length === 0) {
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      const sliceAngle = (Math.PI * 2) / rouletteSlices.length;

      rouletteSlices.forEach((slice, i) => {
        const start = i * sliceAngle - Math.PI / 2;
        const end = start + sliceAngle;

        // Slice fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = slice.color;
        ctx.fill();

        // Black divider lines
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(start), cy + r * Math.sin(start));
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.stroke();

        // Text or emote label
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + sliceAngle / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const displayText = slice.emote || slice.text;
        if (slice.emote) {
          ctx.font = '32px serif';
          ctx.fillText(displayText, r * 0.55, 0);
        } else {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px Inter';
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 4;
          ctx.shadowOffsetX = 1;
          ctx.shadowOffsetY = 1;
          const text = displayText.length > 16 ? displayText.substring(0, 14) + '…' : displayText;
          ctx.fillText(text, r * 0.55, 0);
        }
        ctx.restore();
      });

      // Outer ring - green neon
      ctx.beginPath();
      ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#53FC18';
      ctx.lineWidth = 3;
      ctx.shadowColor = 'rgba(83,252,24,0.6)';
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Black border
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Black center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 34, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a0a';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Green center accent
      ctx.beginPath();
      ctx.arc(cx, cy, 28, 0, Math.PI * 2);
      ctx.strokeStyle = '#53FC18';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(83,252,24,0.4)';
      ctx.shadowBlur = 6;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#53FC18';
      ctx.fill();
    }

    function animateRouletteSpin(targetAngle, duration) {
      ensureRouletteContainer();
      const canvas = document.getElementById('roulette-canvas');
      if (!canvas) return;
      canvas.style.transition = 'none';
      canvas.style.transform = `rotate(${currentRotation}deg)`;
      canvas.offsetHeight; // force reflow
      canvas.style.transition = `transform ${duration}ms cubic-bezier(0.17, 0.67, 0.12, 0.99)`;
      canvas.style.transform = `rotate(${targetAngle}deg)`;
      currentRotation = targetAngle;
    }

    function showRouletteResult(result) {
      let popup = document.getElementById('roulette-result-popup');
      if (!popup) {
        popup = document.createElement('div');
        popup.id = 'roulette-result-popup';
        popup.className = 'overlay-element';
        container.appendChild(popup);
      }
      popup.style.display = 'block';
      popup.className = 'overlay-element result-appear';
      popup.innerHTML = `
        <div class="result-label">Winner</div>
        <div class="result-text">${result}</div>
      `;

      // After 1.5s of showing result, hide the wheel
      setTimeout(() => {
        hideRouletteWheel();
      }, 1500);

      // Hide result popup after 6s
      setTimeout(() => {
        popup.style.display = 'none';
      }, 6000);
    }

    // ─── Alerts ───
    function renderAlert(data) {
      if (!elementVisibility.alertBox) return;
      let ab = document.getElementById('alert-box');
      if (!ab) {
        ab = document.createElement('div');
        ab.id = 'alert-box';
        ab.className = 'overlay-element';
        container.appendChild(ab);
      }
      ab.style.display = 'block';
      ab.className = `overlay-element ${data.anim || 'anim-scale-pop'}`;
      ab.innerText = data.text;

      setTimeout(() => {
        ab.className = 'overlay-element';
        ab.style.display = 'none';
      }, data.duration || 4000);
    }

    function renderCoopNotification(data) {
      const notif = document.createElement('div');
      notif.className = 'overlay-element';
      notif.style.cssText = 'bottom:40px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#53FC18; padding:12px 24px; border-radius:10px; font-size:16px; font-weight:600; border:1px solid rgba(83,252,24,0.3);';
      notif.innerText = data.message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 5000);
    }

    // ─── Init ───
    init();
  </script>
</body>
</html>
